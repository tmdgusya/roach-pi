name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install root dependencies
        run: npm ci

      - name: Install agentic harness dependencies
        run: npm ci
        working-directory: extensions/agentic-harness

      - name: Test agentic harness
        run: npm test
        working-directory: extensions/agentic-harness

      - name: Build agentic harness
        run: npm run build
        working-directory: extensions/agentic-harness

      - run: npx semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
